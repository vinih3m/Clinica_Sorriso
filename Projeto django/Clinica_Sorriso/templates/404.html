<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Erro - Página não encontrada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .error-box {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .error-code {
            font-size: 96px;
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .error-text {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .btn-home {
            padding: 10px 25px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="error-box">
    <div class="error-code">404</div>
    <div class="error-title">Página não encontrada</div>
    <p class="error-text">
        O endereço que você tentou acessar não existe ou foi removido.
    </p>

    <a href="{% url 'redirect_pos_login' %}" class="btn btn-danger btn-home">
        Voltar para a página inicial
    </a>
</div>

</body>
</html>
