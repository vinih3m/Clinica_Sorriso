<form method="post" class="modal-agendamento">
  {% csrf_token %}

  <h2>Novo Agendamento</h2>
  <p class="subtitulo">Preencha os dados abaixo</p>

  <div class="form-grid">
    <div class="campo">
      <label>👤 Paciente</label>
      {{ form.paciente_nome }}
    </div>

    <div class="campo">
      <label>🦷 Profissional</label>
      {{ form.profissional }}
    </div>

    <div class="campo">
      <label>📅 Data</label>
      {{ form.data }}
    </div>

    <div class="campo">
      <label>⏰ Hora início</label>
      {{ form.hora_inicio }}
    </div>

    <div class="campo">
      <label>⏱ Hora fim</label>
      {{ form.hora_fim }}
    </div>
  </div>

  {% if form.observacoes %}
  <div class="campo">
    <label>📝 Observações</label>
    {{ form.observacoes }}
  </div>
  {% endif %}

  <div class="acoes">
    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
    <button type="submit" class="btn-salvar">Salvar</button>
  </div>
</form>

<style>
    .modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 9999;
}

.modal-content {
  background: #fff;
  width: 460px;
  margin: 5% auto;
  border-radius: 14px;
  padding: 24px;
  position: relative;
  animation: aparecer .25s ease;
}

@keyframes aparecer {
  from { transform: scale(.95); opacity: 0 }
  to { transform: scale(1); opacity: 1 }
}

.modal-agendamento h2 {
  margin: 0;
  color: #0d5ea6;
}

.subtitulo {
  font-size: 14px;
  color: #777;
  margin-bottom: 20px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.campo {
  display: flex;
  flex-direction: column;
}

.campo label {
  font-size: 13px;
  margin-bottom: 5px;
  color: #555;
}

.campo input,
.campo select,
.campo textarea {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.campo input:focus,
.campo select:focus {
  outline: none;
  border-color: #1976d2;
}

.acoes {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 25px;
}

.btn-cancelar {
  background: #eee;
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-salvar {
  background: #1976d2;
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-salvar:hover {
  background: #155fa0;
}

</style>
