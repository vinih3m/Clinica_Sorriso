{% extends "base.html" %}

{% block content %}
<style>

/* ================================
   FUNDO GERAL (SaaS Look)
================================ */

body {
    background: #f5f7fa;
}


/* ================================
   CONTAINER PRINCIPAL
================================ */

.financeiro-container {
    padding: 30px 35px;
}


/* ================================
   MENU SUPERIOR
================================ */

.financeiro-menu {
    display: flex;
    gap: 35px;
    border-bottom: 2px solid #e5e5e5;
    margin-bottom: 30px;
}

.financeiro-menu a {
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    color: #667085;
    padding-bottom: 12px;
    letter-spacing: 0.5px;
    transition: 0.2s ease;
}

.financeiro-menu a:hover {
    color: #1976d2;
}

.financeiro-menu a.ativo {
    color: #1976d2;
    border-bottom: 3px solid #1976d2;
}


/* ================================
   TOPO DO FLUXO
================================ */

.fluxo-topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.filtro-esquerda {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* Inputs e Select modernos */

.filtro-esquerda select,
.filtro-esquerda input {
    height: 40px;
    padding: 0 14px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    background: #ffffff;
    font-size: 14px;
    outline: none;
    transition: all 0.2s ease;
}

.filtro-esquerda select:focus,
.filtro-esquerda input:focus {
    border-color: #1976d2;
    box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
}

/* Botões neutros (Filtrar / Exportar) */

.btn-filtro,
.btn-exportar {
    height: 40px;
    padding: 0 18px;
    border-radius: 8px;
    border: 1px solid #d0d5dd;
    background: #f9fafb;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s ease;
}

.btn-filtro:hover,
.btn-exportar:hover {
    background: #eef2f7;
    border-color: #98a2b3;
}


/* BOTÃO ADICIONAR */

.btn-adicionar {
    background-color: #16a34a;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-adicionar:hover {
    background-color: #15803d;
    transform: translateY(-1px);
}


/* ================================
   CARD RESUMO FINANCEIRO
================================ */

.card-resumo {
    background: #ffffff;
    border-radius: 16px;
    padding: 35px;
    margin-top: 20px;
    box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
}

.resumo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.resumo-grid {
    display: flex;
    justify-content: space-between;
    gap: 50px;
}

.resumo-item {
    display: flex;
    flex-direction: column;
}

.resumo-label {
    font-size: 13px;
    font-weight: 600;
    color: #667085;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
}

.resumo-valor {
    font-size: 26px;
    font-weight: 700;
}


/* CORES */

.positivo {
    color: #16a34a;
}

.negativo {
    color: #dc2626;
}


/* ================================
   BOTÃO RELATÓRIOS (SaaS Style)
================================ */

.btn-relatorios {
    background: #e8f0fe;
    border: 1px solid #c6dafc;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #1d4ed8;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-relatorios:hover {
    background: #dbeafe;
    transform: translateY(-1px);
}


/* ================================
   LISTA FINANCEIRA
================================ */

.lista-financeiro {
    background: white;
    border-radius: 12px;
    padding: 25px;
    margin-top: 30px;
    box-shadow: 0 4px 12px rgba(16,24,40,0.05);
}

.lista-topo {
    display: flex;
    font-weight: 600;
    color: #667085;
    padding-bottom: 12px;
    border-bottom: 1px solid #eee;
    margin-bottom: 20px;
}

.col-data {
    width: 150px;
}

.col-nome {
    flex: 1;
}

.col-valor {
    width: 150px;
    text-align: right;
}

.lista-vazia {
    text-align: center;
    padding: 60px 20px;
    color: #98a2b3;
}

.icone-vazio {
    font-size: 50px;
    margin-bottom: 20px;
    opacity: 0.5;
}

/* ================================
   ÍCONES DO RESUMO
================================ */

.resumo-label {
    display: flex;
    align-items: center;
    gap: 6px;
}

.resumo-icon {
    font-size: 18px;
}

/* Cores dos ícones */

.receita-icon {
    color: #16a34a;
}

.despesa-icon {
    color: #dc2626;
}

.saldo-icon {
    color: #1976d2;
}
.resumo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px; /* AQUI aumenta o respiro */
}

.resumo-grid {
    display: flex;
    justify-content: space-between;
    gap: 60px; /* aumenta espaço entre receitas/despesas/saldo */
}

.btn-relatorios {
    margin-bottom: 10px;
}

/* OVERLAY */

.overlay-filtro {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 1000;
}

/* MODAL */

.modal-filtro {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    width: 600px;
    max-width: 95%;
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    display: none;
    z-index: 1001;
    transition: all 0.2s ease;
}

.modal-filtro.ativo {
    transform: translate(-50%, -50%) scale(1);
}

/* HEADER */

.modal-header {
    margin-bottom: 25px;
}

.modal-header h3 {
    margin: 0;
    font-size: 20px;
}

/* BODY */

.modal-body-custom {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.filtro-linha {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.filtro-linha label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
}

/* FOOTER */

.modal-footer {
    margin-top: 30px;
    display: flex;
    justify-content: flex-end;
    gap: 15px;
}

.btn-secundario {
    background: none;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.btn-primario {
    background: #1976d2;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
}

/* ================================
   SELECT CUSTOM - CAIXA
================================ */

.filtro-grupo {
    margin-top: 20px;
}

.filtro-grupo label {
    font-size: 13px;
    font-weight: 600;
    color: #667085;
    display: block;
    margin-bottom: 6px;
}

.select-custom {
    position: relative;
    width: 100%;
}

.select-trigger {
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 10px 12px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.select-trigger:hover {
    border-color: #98a2b3;
}

.arrow {
    font-size: 12px;
}

.select-dropdown {
    width: 100%;
    background: white;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    display: none;
    max-height: 240px;
    overflow-y: auto;
    padding: 10px;
    z-index: 1000;
}

.select-dropdown label {
    display: flex;
    gap: 8px;
    padding: 6px;
    cursor: pointer;
    font-weight: 500;
    color: #344054;
}

.select-dropdown label:hover {
    background: #f2f4f7;
    border-radius: 6px;
}

.select-custom.ativo .select-dropdown {
    display: block;
}

/* Select ativo estilo azul */
.select-custom.ativo .select-trigger {
    border-color: #2970ff;
    box-shadow: 0 0 0 2px rgba(41,112,255,0.1);
}

/* Scroll estilizado */
.select-dropdown::-webkit-scrollbar {
    width: 6px;
}

.select-dropdown::-webkit-scrollbar-thumb {
    background: #d0d5dd;
    border-radius: 10px;
}

.select-dropdown::-webkit-scrollbar-thumb:hover {
    background: #98a2b3;
}

/* GRID PARA CAMPOS LADO A LADO */

.filtros-duplos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.campo-filtro {
    display: flex;
    flex-direction: column;
}

.campo-filtro.full {
    margin-top: 20px;
}

/* Quando for largura total */
.full-width {
    width: 100%;
}

/* Grupo full ocupa linha inteira */
.filtro-grupo.full {
    width: 100%;
    margin-top: 25px;
}

/* Ajuste dropdown maior */
.select-custom.full-width .select-dropdown {
    max-height: 250px;

}

.switch {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;

}

/* esconde checkbox real */
.switch input {
    display: none;
}

/* trilho */
.slider {
    position: relative;
    width: 46px;
    height: 24px;
    background-color: #ccc;
    border-radius: 50px;
    transition: 0.3s;
}

/* bolinha */
.slider::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

/* quando ativado */
.switch input:checked + .slider {
    background-color: #1f8fff; /* pode trocar pela cor do sistema */
}

.switch input:checked + .slider::before {
    transform: translateX(22px);
}

/* 1. Arranca qualquer propriedade que trave o clique ou a digitação */
#input-busca-categoria-pagar,
.select-trigger-combobox input,
[id*="busca-categoria"] {
    pointer-events: auto !important;
    cursor: text !important;
    user-select: text !important;
    -webkit-user-select: text !important;
}

/* 2. Se a biblioteca colocou uma div invisível por cima para bloquear o clique, isso remove ela */
.combobox-container *, 
#combobox-categoria-pagar * {
    pointer-events: auto !important;
}

/* 3. Força o Meio de Pagamento a aceitar clique e abrir a lista de opções */
#pagar_meio,
.form-select,
select[name="meio_pagamento"] {
    pointer-events: auto !important;
    cursor: pointer !important;
}
#modalPagarDespesa .modal-body {
    display: block !important;
    gap: 0 !important;
}
#modalPagarDespesa .row {
    margin-bottom: 15px;
}

    min-height: 90px;

}

}

#modal-subtitulo{
    color:#777;

}

/* Garante espaçamento consistente nas linhas do grid */
#modalNovoPaciente .grid-2, 
#modalNovoPaciente .grid-3, 
#modalNovoPaciente .grid-4 {
    gap: 15px;
    margin-bottom: 15px;
}

/* Estilização das abas internas do paciente */
#modalNovoPaciente .tabs {
    display: flex;
    gap: 10px;
    border-bottom: 2px solid #eee;
    margin-bottom: 15px;
}

#modalNovoPaciente .tab-paciente {
    background: none;
    border: none;
    padding: 10px 15px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
}

#modalNovoPaciente .tab-paciente.active {
    color: #007bff;
    border-bottom-color: #007bff;
}

/* Container e rótulo do rádio customizado */
.radio-label-clinica {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    color: #333;
    cursor: pointer;
    user-select: none;
    position: relative;
}

/* Esconde o input radio padrão do navegador */
.radio-label-clinica input[type="radio"] {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    html-height: 0;
    width: 0;
}

/* Cria o círculo customizado vazio */
.radio-label-clinica .custom-radio {
    height: 18px;
    width: 18px;
    background-color: #fff;
    border: 2px solid #ccc;
    border-radius: 50%;
    display: inline-block;
    position: relative;
    transition: border-color 0.2s, background-color 0.2s;
}

/* Efeito de hover ao passar o mouse */
.radio-label-clinica:hover input ~ .custom-radio {
    border-color: #999;
}

/* Quando selecionado, altera a borda */
.radio-label-clinica input:checked ~ .custom-radio {
    border-color: #007bff; /* Ou a cor padrão de destaque do seu sistema */
}

/* Cria a bolinha interna preenchida (oculta por padrão) */
.radio-label-clinica .custom-radio:after {
    content: "";
    position: absolute;
    display: none;
    top: 4px;
    left: 4px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #007bff; /* Cor do miolo selecionado */
}

/* Mostra a bolinha interna quando o rádio estiver marcado */
.radio-label-clinica input:checked ~ .custom-radio:after {
    display: block;
}
